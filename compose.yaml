services:
  namenode:
    image: apache/hadoop:3.3.6
    container_name: namenode
    hostname: namenode
    command: ["hdfs", "namenode"]
    ports:
      - "9870:9870"
      - "9000:9000"
    env_file: ./hadoop.env
    environment:
      ENSURE_NAMENODE_DIR: "/tmp/hadoop-root/dfs/name"
    networks:
      - mif

  datanode1:
    image: apache/hadoop:3.3.6
    container_name: datanode1
    hostname: datanode1
    command: ["hdfs", "datanode"]
    env_file: ./hadoop.env
    depends_on:
      - namenode
    networks:
      - mif

  datanode2:
    image: apache/hadoop:3.3.6
    container_name: datanode2
    hostname: datanode2
    command: ["hdfs", "datanode"]
    env_file: ./hadoop.env
    depends_on:
      - namenode
    networks:
      - mif

networks:
  mif: